# ABCD Closure Test Configuration for SV Objects
# Testing by predicting region A instead of D

analysis:
  method: "ABCD"
  name: "SV_ABCD_Closure_Test"
  luminosity: 30.0  # fb^-1
  output_json: "sv_abcd_closure.json"
  output_dir: "./json/"

samples:
  backgrounds: []  # Empty background list for closure test
  signals:
    - "gogoZ"
  signal_points:
    - "gogoZ_1500_500_100_10"
  data:
    - "DisplacedJet18"

# ABCD closure test - predict region A using B, C, D
abcd:
  regions:
    region_A: "nLep1CRA"    # Leptonic, low dxySig (TO BE PREDICTED)
    region_B: "nLep1CRB"    # Leptonic, high dxySig  
    region_C: "nHad1CRC"    # Hadronic, low dxySig
    region_D: "nHad1CRD"    # Hadronic, high dxySig
  predicted_region: "region_A"        # Predict A for closure test
  formula: "(@0*@1/@2)"              # A = B*C/D
  generate_datacards: true

# Define all 4 ABCD regions (same as main analysis)
bins:
  nLep1CRA:    # Region A - Leptonic SV, low dxySig (TO BE PREDICTED)
    description: "Leptonic SV, low dxySig (100-300) - PREDICTED FOR CLOSURE"
    cuts: 
      - "SV_nLeptonic == 1"
      - "LeptonicSV_dxySig[0] > 100"
      - "LeptonicSV_dxySig[0] < 300"
    
  nLep1CRB:    # Region B - Leptonic SV, high dxySig
    description: "Leptonic SV, high dxySig (300-1000)" 
    cuts:
      - "SV_nLeptonic == 1"
      - "LeptonicSV_dxySig[0] > 300"
      - "LeptonicSV_dxySig[0] < 1000"
    
  nHad1CRC:    # Region C - Hadronic SV, low dxySig
    description: "Hadronic SV, low dxySig (100-300)"
    cuts:
      - "SV_nHadronic == 1"
      - "HadronicSV_dxySig[0] > 100"
      - "HadronicSV_dxySig[0] < 300"
    
  nHad1CRD:    # Region D - Hadronic SV, high dxySig
    description: "Hadronic SV, high dxySig (300-1000)"
    cuts:
      - "SV_nHadronic == 1"
      - "HadronicSV_dxySig[0] > 300" 
      - "HadronicSV_dxySig[0] < 1000"

# Systematics for closure test
systematics:
  abcd_systematics:
    # Rate parameters for control regions B, C, D (used to predict A)
    - name: "scale_closure_B"
      type: "rateParam"
      value: 1.0
      bins: ["auto_control_1"]  # Region B
      processes: ["backgrounds"]
      
    - name: "scale_closure_C"
      type: "rateParam"
      value: 1.0  
      bins: ["auto_control_2"]  # Region C
      processes: ["backgrounds"]
      
    - name: "scale_closure_D"
      type: "rateParam"
      value: 1.0
      bins: ["auto_control_3"]  # Region D
      processes: ["backgrounds"]

    # ABCD constraint for closure: A = B*C/D
    - name: "abcd_closure_constraint"
      type: "rateParam"
      formula: "auto"
      bins: ["auto_predicted"]  # Region A
      processes: ["backgrounds"]

  precision_systematics:
    # Modest systematics for closure test
    - name: "closure_precision_B"
      type: "lnN"
      value: 1.10
      bins: ["auto_control_1"]
      processes: ["backgrounds"]
      
    - name: "closure_precision_C" 
      type: "lnN"
      value: 1.10
      bins: ["auto_control_2"]
      processes: ["backgrounds"]
      
    - name: "closure_precision_D"
      type: "lnN" 
      value: 1.10
      bins: ["auto_control_3"]
      processes: ["backgrounds"]

# Runtime options
options:
  verbosity: 2
  parallel: false
  dry_run: false