# ABCD Method Example Configuration
# Example ABCD analysis for long-lived particle search

analysis:
  method: "ABCD"
  name: "ABCD_LLP_Search"
  luminosity: 400.0  # fb^-1
  output_json: "abcd_analysis.json"
  output_dir: "./results/"

samples:
  backgrounds:
    - "Wjets"
    - "Zjets" 
    - "Gjets"
    - "Top"
    - "QCD"
  signals:
    - "gogoG"   # Gluino pair production

# ABCD method configuration
abcd:
  regions:
    region_A: "SR_HighMET_HighMass"    # Signal region (to be predicted)
    region_B: "CR_HighMET_LowMass"     # Control region B
    region_C: "CR_LowMET_HighMass"     # Control region C  
    region_D: "CR_LowMET_LowMass"      # Control region D
  predicted_region: "region_A"         # A = B*C/D
  formula: "(@0*@1/@2)"                # Default ABCD formula
  generate_datacards: true             # Generate CombineHarvester datacards (default: true)

# Define all 4 ABCD regions
bins:
  SR_HighMET_HighMass:    # Signal region (A)
    description: "Signal Region - High MET, High Mass"
    cuts: 
      - "nSelPhotons == 1"
      - "met > 200"
      - "rjr_Mr[1] > 1000"
      - "rjr_Rv[1] > 0.3"
    
  CR_HighMET_LowMass:     # Control region B
    description: "Control Region B - High MET, Low Mass" 
    cuts:
      - "nSelPhotons == 1" 
      - "met > 200"
      - "rjr_Mr[1] < 500"
      - "rjr_Rv[1] > 0.3"
    
  CR_LowMET_HighMass:     # Control region C
    description: "Control Region C - Low MET, High Mass"
    cuts:
      - "nSelPhotons == 1"
      - "met < 100"
      - "rjr_Mr[1] > 1000" 
      - "rjr_Rv[1] > 0.3"
    
  CR_LowMET_LowMass:      # Control region D
    description: "Control Region D - Low MET, Low Mass"
    cuts:
      - "nSelPhotons == 1"
      - "met < 100"
      - "rjr_Mr[1] < 500"
      - "rjr_Rv[1] > 0.3"

# Systematics configuration
systematics:
  # Standard experimental systematics
  experimental:
    - name: "luminosity"
      type: "lnN"
      value: 1.025
      bins: ["all"]
      processes: ["all"]
      
    - name: "jet_energy_scale"
      type: "lnN"
      value: 1.05
      bins: ["all"]
      processes: ["backgrounds"]

  # ABCD-specific systematics  
  abcd_systematics:
    # Rate parameters for control regions
    - name: "scale_CR_HighMET_LowMass"
      type: "rateParam"
      value: 1.0
      bins: ["auto_control_1"]
      processes: ["backgrounds"]
      
    - name: "scale_CR_LowMET_HighMass"
      type: "rateParam"
      value: 1.0  
      bins: ["auto_control_2"]
      processes: ["backgrounds"]
      
    - name: "scale_CR_LowMET_LowMass"
      type: "rateParam"
      value: 1.0
      bins: ["auto_control_3"] 
      processes: ["backgrounds"]

    # ABCD constraint: A = B*C/D
    - name: "abcd_constraint"
      type: "rateParam"
      formula: "auto"
      bins: ["auto_predicted"]
      processes: ["backgrounds"]

  # Precision constraints per control region
  precision_systematics:
    - name: "precision_control_B"
      type: "lnN"
      value: 1.001  # Very tight
      bins: ["auto_control_1"]
      processes: ["backgrounds"]
      
    - name: "precision_control_C" 
      type: "lnN"
      value: 1.20   # Medium
      bins: ["auto_control_2"]
      processes: ["backgrounds"]
      
    - name: "precision_control_D"
      type: "lnN" 
      value: 1.50   # Loose
      bins: ["auto_control_3"]
      processes: ["backgrounds"]

# Runtime options
options:
  verbosity: 2          # Detailed output
  parallel: false       # Disable parallel processing for clarity
  dry_run: false        # Actually run the analysis