analysis:
  name: "Signal Subset Example"
  method: "standard"
  luminosity: 400.0
  output_json: "signal_subset_results.json"
  output_dir: "./json/"

samples:
  backgrounds:
    - "Wjets"
    - "Zjets"
    - "Top"
    - "Gjets"
    - "QCD"
    - "Box"
  
  signals: ["gogoZ"]  # Signal type to load
  
  # Optional: specify exact signal points to use
  signal_points:
    - "gogoZ_2000_400_350_10"
    - "gogoZ_2000_400_350_30"
    - "gogoZ_1500_500_100_10"

bins:
  G1CRA:
    description: "ABCD Region A"
    cuts:
      - "(nSelPhotons==1)"
      - "(rjr_Mr[1] > 2000)"
      - "(rjr_R[1] > 0.2)"
      - "(rjr_Rs[1] < 0.1)"
      - "(rjr_Ms[1] > 1500 && rjr_Ms[1] < 2000)"

  G1CRB:
    description: "ABCD Region B" 
    cuts:
      - "(nSelPhotons==1)"
      - "(rjr_Mr[1] > 2000)"
      - "(rjr_R[1] > 0.2)"
      - "(rjr_Rs[1] > 0.1 && rjr_Rs[1] < 0.2)"
      - "(rjr_Ms[1] > 1500 && rjr_Ms[1] < 2000)"