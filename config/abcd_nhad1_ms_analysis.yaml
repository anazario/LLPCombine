# ABCD Analysis Configuration for nHad==1 with Ms binning
# Ms binning: low = [1000, 2000], med+high = [2000, inf]
# dxySig binning: low = [100, 300], high = [300, 1000]

analysis:
  method: "ABCD"
  name: "nHad1_Ms_ABCD_Analysis"
  luminosity: 30.0  # fb^-1
  output_json: "nhad1_ms_abcd.json"
  output_dir: "./json/"

samples:
  backgrounds: []  # Empty background list for closure test
  signals:
    - "gogoZ"
  data:
    - "DisplacedJet18"

# ABCD regions with nHad==1, Ms and dxySig binning
abcd:
  regions:
    region_A: "nHad1_MsLow_dxySigLow"     # Ms low, dxySig low (TO BE PREDICTED)
    region_B: "nHad1_MsLow_dxySigHigh"    # Ms low, dxySig high
    region_C: "nHad1_MsHigh_dxySigLow"    # Ms high, dxySig low
    region_D: "nHad1_MsHigh_dxySigHigh"   # Ms high, dxySig high
  predicted_region: "region_A"        # Predict A using B*C/D
  formula: "(@0*@1/@2)"              # A = B*C/D
  generate_datacards: true

# Define all 4 ABCD regions with nHad==1
bins:
  nHad1_MsLow_dxySigLow:    # Region A - Ms low, dxySig low (TO BE PREDICTED)
    description: "nHad==1, Ms low (1000-2000), dxySig low (100-300) - PREDICTED"
    cuts: 
      - "SV_nHadronic == 1"
      - "rjr_Ms[1] > 1000"
      - "rjr_Ms[1] < 2000"
      - "HadronicSV_dxySig[0] > 100"
      - "HadronicSV_dxySig[0] < 300"
    
  nHad1_MsLow_dxySigHigh:    # Region B - Ms low, dxySig high
    description: "nHad==1, Ms low (1000-2000), dxySig high (300-1000)" 
    cuts:
      - "SV_nHadronic == 1"
      - "rjr_Ms[1] > 1000"
      - "rjr_Ms[1] < 2000"
      - "HadronicSV_dxySig[0] > 300"
      - "HadronicSV_dxySig[0] < 1000"
    
  nHad1_MsHigh_dxySigLow:    # Region C - Ms high, dxySig low
    description: "nHad==1, Ms high (2000+), dxySig low (100-300)"
    cuts:
      - "SV_nHadronic == 1"
      - "rjr_Ms[1] > 2000"
      - "HadronicSV_dxySig[0] > 100"
      - "HadronicSV_dxySig[0] < 300"
    
  nHad1_MsHigh_dxySigHigh:    # Region D - Ms high, dxySig high
    description: "nHad==1, Ms high (2000+), dxySig high (300-1000)"
    cuts:
      - "SV_nHadronic == 1"
      - "rjr_Ms[1] > 2000"
      - "HadronicSV_dxySig[0] > 300" 
      - "HadronicSV_dxySig[0] < 1000"

# Systematics (same structure as sv closure test)
systematics:
  abcd_systematics:
    # Rate parameters for control regions B, C, D (used to predict A)
    - name: "scale_closure_B"
      type: "rateParam"
      value: 1.0
      bins: ["auto_control_1"]  # Region B
      processes: ["backgrounds"]
      
    - name: "scale_closure_C"
      type: "rateParam"
      value: 1.0  
      bins: ["auto_control_2"]  # Region C
      processes: ["backgrounds"]
      
    - name: "scale_closure_D"
      type: "rateParam"
      value: 1.0
      bins: ["auto_control_3"]  # Region D
      processes: ["backgrounds"]

    # ABCD constraint: A = B*C/D
    - name: "abcd_closure_constraint"
      type: "rateParam"
      formula: "auto"
      bins: ["auto_predicted"]  # Region A
      processes: ["backgrounds"]

  precision_systematics:
    # Precision systematics for control regions
    - name: "closure_precision_B"
      type: "lnN"
      value: 1.10
      bins: ["auto_control_1"]
      processes: ["backgrounds"]
      
    - name: "closure_precision_C" 
      type: "lnN"
      value: 1.10
      bins: ["auto_control_2"]
      processes: ["backgrounds"]
      
    - name: "closure_precision_D"
      type: "lnN" 
      value: 1.10
      bins: ["auto_control_3"]
      processes: ["backgrounds"]

# Runtime options
options:
  verbosity: 2
  parallel: false
  dry_run: false