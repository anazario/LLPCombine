# ABCD Configuration for nLeptonic Rs regions predicting B
# Manually created to match working format exactly

analysis:
  method: "ABCD"
  name: "nLep_Rs_PredictB"
  luminosity: 30.0
  output_json: "nlep_rs_predictb.json"
  output_dir: "./json/"

samples:
  backgrounds: []
  signals:
    - "gogoZ"
  signal_points:
    - "gogoZ_1500_500_100_10"
  data:
    - "DisplacedJet18"

# ABCD regions - predict region B using A, C, D
abcd:
  regions:
    region_A: "nLeptonic_Rs_A"
    region_B: "nLeptonic_Rs_B"    
    region_C: "nLeptonic_Rs_C"
    region_D: "nLeptonic_Rs_D"
  predicted_region: "region_B"
  formula: "(@0*@1/@2)"
  generate_datacards: true

# Define all 4 ABCD regions
bins:
  nLeptonic_Rs_A:
    description: "nLeptonic, Var1 0.3-0.5, dxySig low"
    cuts:
      - "SV_nLeptonic == 1"
      - "rjr_Rs[1] > 0.3"
      - "rjr_Rs[1] < 0.5"
      - "LeptonicSV_dxySig[0] > 100.0"
      - "LeptonicSV_dxySig[0] < 300.0"
    
  nLeptonic_Rs_B:
    description: "nLeptonic, Var1 0.3-0.5, dxySig high - PREDICTED"
    cuts:
      - "SV_nLeptonic == 1"
      - "rjr_Rs[1] > 0.3"
      - "rjr_Rs[1] < 0.5"
      - "LeptonicSV_dxySig[0] > 300.0"
      - "LeptonicSV_dxySig[0] < 1000"
    
  nLeptonic_Rs_C:
    description: "nLeptonic, Var1 0.15-0.3, dxySig low"
    cuts:
      - "SV_nLeptonic == 1"
      - "rjr_Rs[1] > 0.15"
      - "rjr_Rs[1] < 0.3"
      - "LeptonicSV_dxySig[0] > 100.0"
      - "LeptonicSV_dxySig[0] < 300.0"
    
  nLeptonic_Rs_D:
    description: "nLeptonic, Var1 0.15-0.3, dxySig high"
    cuts:
      - "SV_nLeptonic == 1"
      - "rjr_Rs[1] > 0.15"
      - "rjr_Rs[1] < 0.3"
      - "LeptonicSV_dxySig[0] > 300.0"
      - "LeptonicSV_dxySig[0] < 1000"

# Systematics for ABCD analysis - EXACT format from working config
systematics:
  abcd_systematics:
    # Rate parameters for control regions A, C, D (used to predict B)
    - name: "scale_nlep_A"
      type: "rateParam"
      value: 1.0
      bins: ["auto_control_1"]
      processes: ["backgrounds"]
      
    - name: "scale_nlep_C"
      type: "rateParam"
      value: 1.0  
      bins: ["auto_control_2"]
      processes: ["backgrounds"]
      
    - name: "scale_nlep_D"
      type: "rateParam"
      value: 1.0
      bins: ["auto_control_3"]
      processes: ["backgrounds"]

    # ABCD constraint for predicting B: B = A*D/C
    - name: "abcd_nlep_constraint"
      type: "rateParam"
      formula: "auto"
      bins: ["auto_predicted"]
      processes: ["backgrounds"]

  precision_systematics:
    # Modest systematics for control regions
    - name: "nlep_precision_A"
      type: "lnN"
      value: 1.10
      bins: ["auto_control_1"]
      processes: ["backgrounds"]
      
    - name: "nlep_precision_C" 
      type: "lnN"
      value: 1.10
      bins: ["auto_control_2"]
      processes: ["backgrounds"]
      
    - name: "nlep_precision_D"
      type: "lnN" 
      value: 1.10
      bins: ["auto_control_3"]
      processes: ["backgrounds"]

# Runtime options
options:
  verbosity: 2
  parallel: false
  dry_run: false